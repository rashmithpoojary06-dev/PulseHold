<!DOCTYPE html>
<html>
<head>
  <title>PulseHold</title>
  <style>
    body { text-align: center; font-family: Arial; }
    #bar {
      width: 0%;
      height: 20px;
      background: green;
      margin: 20px auto;
      transition: width 0.1s;
    }
    #container {
      width: 80%;
      height: 20px;
      background: #ddd;
      margin: auto;
    }
  </style>
</head>
<body>

<h1>PulseHold</h1>
<p>Hold to Stabilize</p>

<div id="container">
  <div id="bar"></div>
</div>

<button id="holdBtn">HOLD</button>
<p id="status">Ready</p>

<script>
let bar = document.getElementById("bar");
let status = document.getElementById("status");
let btn = document.getElementById("holdBtn");

let width = 0;
let interval;

function startHold() {
  interval = setInterval(() => {
    if (width >= 100) {
      clearInterval(interval);
      status.innerText = "Stabilized!";
    } else {
      width++;
      bar.style.width = width + "%";
      status.innerText = "Stabilizing...";
    }
  }, 50);
}

function stopHold() {
  clearInterval(interval);
  if (width < 100) {
    width = 0;
    bar.style.width = "0%";
    status.innerText = "Lost Stability!";
  }
}

btn.addEventListener("mousedown", startHold);
btn.addEventListener("mouseup", stopHold);
btn.addEventListener("touchstart", startHold);
btn.addEventListener("touchend", stopHold);
</script>

</body>
</html>
