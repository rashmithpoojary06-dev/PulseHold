<!DOCTYPE html>
<html>
<head>
  <title>PulseHold</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 50px;
    }

    #container {
      width: 80%;
      height: 25px;
      background: #ddd;
      margin: 20px auto;
      border-radius: 20px;
      overflow: hidden;
    }

    #bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(to right, red, green);
      transition: width 0.05s;
    }

    button {
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 30px;
      border: none;
      background: black;
      color: white;
    }
  </style>
</head>
<body>

<h1>PulseHold</h1>
<p>Hold the button to stabilize</p>

<div id="container">
  <div id="bar"></div>
</div>

<button id="holdBtn">HOLD</button>
<p id="status">Ready</p>

<script>
let bar = document.getElementById("bar");
let status = document.getElementById("status");
let btn = document.getElementById("holdBtn");

let width = 0;
let interval = null;

function startHold(e) {
  e.preventDefault();
  if (interval) return;

  interval = setInterval(() => {
    if (width >= 100) {
      clearInterval(interval);
      interval = null;
      status.innerText = "Stabilized Successfully!";
    } else {
      width += 1;
      bar.style.width = width + "%";
      status.innerText = "Stabilizing...";
    }
  }, 30);
}

function stopHold() {
  clearInterval(interval);
  interval = null;

  if (width < 100) {
    width = 0;
    bar.style.width = "0%";
    status.innerText = "Lost Stability!";
  }
}

btn.addEventListener("mousedown", startHold);
btn.addEventListener("mouseup", stopHold);
btn.addEventListener("mouseleave", stopHold);

btn.addEventListener("touchstart", startHold);
btn.addEventListener("touchend", stopHold);
</script>

</body>
</html>
