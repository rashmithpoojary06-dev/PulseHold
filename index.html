<!DOCTYPE html>
<html>
<head>
  <title>PulseHold - Stability Challenge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 30px;
      font-size: 28px;
    }

    #pulseCircle {
      width: 150px;
      height: 150px;
      margin: 40px auto;
      border-radius: 50%;
      background: red;
      box-shadow: 0 0 40px red;
      transition: all 0.1s linear;
    }

    #meterContainer {
      width: 80%;
      height: 20px;
      background: #333;
      margin: 20px auto;
      border-radius: 20px;
      overflow: hidden;
    }

    #meter {
      height: 100%;
      width: 0%;
      background: lime;
      transition: width 0.1s linear;
    }

    button {
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 30px;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
      margin-top: 20px;
    }

    #status {
      margin-top: 20px;
      font-size: 18px;
    }

    #score {
      margin-top: 10px;
      font-size: 16px;
      color: cyan;
    }
  </style>
</head>
<body>

<h1>PulseHold</h1>
<p>Hold to Stabilize the Pulse</p>

<div id="pulseCircle"></div>

<div id="meterContainer">
  <div id="meter"></div>
</div>

<button id="holdBtn">HOLD</button>

<p id="status">Ready</p>
<p id="score">Score: 0</p>

<script>
let meter = document.getElementById("meter");
let circle = document.getElementById("pulseCircle");
let statusText = document.getElementById("status");
let scoreText = document.getElementById("score");
let btn = document.getElementById("holdBtn");

let stability = 0;
let score = 0;
let holdInterval = null;
let unstableInterval = null;
let isHolding = false;

// Unstable pulse animation
function startUnstablePulse() {
  unstableInterval = setInterval(() => {
    if (!isHolding) {
      let randomSize = 140 + Math.random() * 30;
      circle.style.width = randomSize + "px";
      circle.style.height = randomSize + "px";
      circle.style.background = "red";
      circle.style.boxShadow = "0 0 40px red";
    }
  }, 150);
}

// Start holding
function startHold(e) {
  e.preventDefault();
  if (holdInterval) return;

  isHolding = true;
  statusText.innerText = "Stabilizing...";

  holdInterval = setInterval(() => {
    if (stability >= 100) {
      clearInterval(holdInterval);
      holdInterval = null;
      score++;
      scoreText.innerText = "Score: " + score;
      statusText.innerText = "Pulse Stabilized!";
      circle.style.background = "lime";
      circle.style.boxShadow = "0 0 40px lime";
      setTimeout(resetGame, 1500);
    } else {
      stability += 2;
      meter.style.width = stability + "%";
      circle.style.width = "150px";
      circle.style.height = "150px";
      circle.style.background = "orange";
      circle.style.boxShadow = "0 0 40px orange";
    }
  }, 50);
}

// Stop holding
function stopHold() {
  isHolding = false;
  clearInterval(holdInterval);
  holdInterval = null;

  if (stability < 100) {
    stability = 0;
    meter.style.width = "0%";
    statusText.innerText = "Pulse Unstable!";
  }
}

// Reset game
function resetGame() {
  stability = 0;
  meter.style.width = "0%";
  statusText.innerText = "Ready";
}

btn.addEventListener("mousedown", startHold);
btn.addEventListener("mouseup", stopHold);
btn.addEventListener("mouseleave", stopHold);

btn.addEventListener("touchstart", startHold);
btn.addEventListener("touchend", stopHold);

startUnstablePulse();
</script>

</body>
</html>
